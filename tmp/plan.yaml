  title: Scaffold & Configuration
  kind: chore
  description: Scaffold project structure, configuration constants, and High-DPI OpenGL setup.
  acceptance:
  - 'Directory structure: connect4/, game/, ai/, ui/, config/, assets/ (with __init__.py where applicable).'
  - 'config/settings.py defines: WINDOW_SIZE=(700,600), BOARD_COLORS={''p1'':''#FF0000'',''p2'':''#0000FF'',''bg'':''#000000'',''grid'':''#FFFFFF''},
    DIFFICULTY_DEPTHS={''easy'':3,''medium'':5,''hard'':7}, ASSET_PATHS={''drop'':''assets/drop.wav'',''win'':''assets/win.wav'',''click'':''assets/click.wav''}.'

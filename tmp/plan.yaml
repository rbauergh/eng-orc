- id: wi_1kwz2tjrgndrpw28y
  title: Core Board Logic
  kind: test
  description: Implement `game/board.py` with 1D array state, `drop_piece`, gravity simulation, win/draw
    detection, and animation row calculation.
  acceptance:
  - '`Board` class manages 7x6 grid as 1D list.'
  - '`drop_piece(col, player)` places piece and returns row.'
  - '`check_win()` detects 4-in-a-row (H/V/D).'
  - '`is_draw()` detects full board.'
  - '`get_animation_row(col)` returns target row for falling animation.'
  - '`test_board.py` covers full column, win in all directions, draw, and empty board.'
  verify_commands:

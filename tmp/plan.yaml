- id: wi_1kwz2tjrg9d83szp4
  title: Main Loop & Integration
  kind: test
  description: Implement `main.py` with state machine (Menu/Play/GameOver), event dispatch, and integration
    of all layers.
  acceptance:
  - Window launches with Menu state.
  - Difficulty selection transitions to Gameplay.
  - Human turn processes clicks; AI turn triggers `compute_move`.
  - Win/Draw transitions to Game Over.
  - Game Over allows restart.

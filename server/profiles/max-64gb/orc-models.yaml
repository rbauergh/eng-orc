# models section for the max-64gb profile.
models:
  profile: max-64gb
  coder:
    model: coder                    # Qwen3-Coder-Next 80B-A3B (non-thinking, agent-tuned)
    context_window: 24576
    max_output_tokens: 4096
    temperature: 0.7
    top_p: 0.95
    thinking: false
  planner:
    model: planner                  # Qwen3.6-35B-A3B MTP, thinking on
    context_window: 16384
    max_output_tokens: 4096
    temperature: 0.9
    top_p: 0.95
    thinking: true
    extra_body:
      chat_template_kwargs: {enable_thinking: true}
  utility:
    model: utility
    context_window: 8192
    max_output_tokens: 1024
    temperature: 0.2
  embedder:
    model: embed
    batch_size: 16

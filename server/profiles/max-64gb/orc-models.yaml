# models section for the max-64gb profile.
models:
  profile: max-64gb
  coder:
    model: coder                    # Qwen3-Coder-Next 80B-A3B (non-thinking, agent-tuned)
    context_window: 24576
    max_output_tokens: 4096
    temperature: 0.7
    top_p: 0.95
    thinking: false
  planner:
    model: planner                  # Qwen3.6-35B-A3B MTP, thinking on
    context_window: 16384
    max_output_tokens: 4096
    temperature: 0.9
    top_p: 0.95
    thinking: true
    extra_body:
      chat_template_kwargs: {enable_thinking: true}
  utility:
    model: utility
    context_window: 8192
    max_output_tokens: 1024
    temperature: 0.2
  embedder:
    model: embed
    batch_size: 16
  extra:
    third-opinion:                  # GLM-4.7-Flash — Zhipu lineage
      model: third-opinion
      context_window: 16384
      max_output_tokens: 3072
      temperature: 0.7
      top_p: 1.0
      thinking: true
      supports_schema: false
    deep-reasoner:                  # Nemotron-Cascade-2 — NVIDIA lineage
      model: deep-reasoner
      context_window: 12288
      max_output_tokens: 4096
      temperature: 0.6
      top_p: 0.95
      thinking: true
      supports_schema: false

review:
  # Three model families sign off on every diff: the Qwen builder is checked
  # by GLM and Nemotron — no seat reviews its own lineage's work through the
  # same lens it was written under.
  panel:
    - {model_role: coder, lens: correctness}          # Qwen3-Coder-Next
    - {model_role: third-opinion, lens: adversarial}  # GLM-4.7-Flash
    - {model_role: deep-reasoner, lens: tests}        # Nemotron-Cascade-2

# models section for the classic-12gb profile.
models:
  profile: classic-12gb
  coder:
    model: coder                    # Qwen2.5-Coder-14B dense, all-GPU
    context_window: 10240           # server runs 12288; leave packing headroom
    max_output_tokens: 3072
    temperature: 0.2
    top_p: 0.9
    thinking: false
  planner:
    model: planner                  # gpt-oss-20b; harmony reasoning stays in reasoning_content
    context_window: 16384
    max_output_tokens: 4096
    temperature: 1.0
    top_p: 1.0
    thinking: true
    supports_schema: false          # prompt-JSON + repair; safest with harmony reasoning
    extra_body:
      chat_template_kwargs: {reasoning_effort: high}
  utility:
    model: utility
    context_window: 8192
    max_output_tokens: 1024
    temperature: 0.2
  embedder:
    model: embed
    batch_size: 16

  extra:
    coder-fallback:              # gpt-oss-20b tuned for the tool loop (low reasoning
      model: planner             # effort — high effort can spend the whole output
      context_window: 16384      # budget thinking before emitting the ACTION line)
      max_output_tokens: 3072
      temperature: 1.0
      top_p: 1.0
      thinking: true
      supports_schema: false
      extra_body:
        chat_template_kwargs: {reasoning_effort: low}

run:
  coder_fallbacks: [coder-fallback]

review:
  panel:
    - {model_role: coder, lens: correctness}     # Qwen2.5-Coder-14B
    - {model_role: planner, lens: adversarial}   # gpt-oss-20b — distinct weights
  # With >=24 GB WSL RAM: download the optional GLM model, add a llama-swap
  # entry for it (copy from the balanced profile), then a third family:
  #   - {model_role: third-opinion, lens: tests}
  # plus under models.extra:
  #   third-opinion: {model: third-opinion, context_window: 16384,
  #                   temperature: 0.7, top_p: 1.0, thinking: true,
  #                   supports_schema: false}
